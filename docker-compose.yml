# 应用 icon 管理端 - 一键部署编排
# 用法：docker compose up -d --build
services:
  app:
    build: .
    image: app-icon-manager
    container_name: app-icon-manager
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # 数据库与上传文件持久化到宿主机，容器重建不丢数据
      - ./data:/app/data
      - ./uploads:/app/uploads
